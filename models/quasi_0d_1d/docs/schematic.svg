<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 38px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .note { font: 18px Arial, Helvetica, sans-serif; fill: #475569; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 3; rx: 8; }
      .heart { fill: #dbeafe; stroke: #2563eb; }
      .aorta { fill: #dcfce7; stroke: #16a34a; }
      .fontan { fill: #fee2e2; stroke: #dc2626; }
      .bed { fill: #fef3c7; stroke: #d97706; }
      .txt { font: 700 20px Arial, Helvetica, sans-serif; fill: #111827; text-anchor: middle; }
      .sub { font: 15px Arial, Helvetica, sans-serif; fill: #374151; text-anchor: middle; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #334155; }
      .edge { fill: none; stroke: #334155; stroke-width: 4; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1800" height="1050" fill="#ffffff"/>
  <text class="title" x="80" y="80">Quasi 0-D/1-D Fontan schematic</text>
  <text class="note" x="80" y="120">Task 005 derived R-L-C chain priors; executable quasi configs are built in later tasks.</text>

  <rect class="box heart" x="90" y="240" width="240" height="120"/>
  <text class="txt" x="210" y="292">active atrium</text>
  <text class="sub" x="210" y="322">0-D elastance</text>

  <rect class="box heart" x="430" y="240" width="240" height="120"/>
  <text class="txt" x="550" y="292">single ventricle</text>
  <text class="sub" x="550" y="322">0-D spherical cavity</text>

  <rect class="box aorta" x="770" y="190" width="260" height="130"/>
  <text class="txt" x="900" y="242">AAo/arch chain</text>
  <text class="sub" x="900" y="274">4 R-L-C cells</text>
  <text class="sub" x="900" y="300">geometry R, c=5.35 m/s</text>

  <rect class="box aorta" x="1120" y="190" width="260" height="130"/>
  <text class="txt" x="1250" y="242">DAo chain</text>
  <text class="sub" x="1250" y="274">6 R-L-C cells</text>
  <text class="sub" x="1250" y="300">geometry R, c=5.35 m/s</text>

  <rect class="box bed" x="1460" y="170" width="230" height="110"/>
  <text class="txt" x="1575" y="218">upper bed</text>
  <text class="sub" x="1575" y="248">0-D systemic</text>

  <rect class="box bed" x="1460" y="330" width="230" height="110"/>
  <text class="txt" x="1575" y="378">lower bed</text>
  <text class="sub" x="1575" y="408">0-D systemic</text>

  <rect class="box fontan" x="1120" y="590" width="250" height="130"/>
  <text class="txt" x="1245" y="642">TCPC junction</text>
  <text class="sub" x="1245" y="674">0-D node in quasi v1</text>
  <text class="sub" x="1245" y="700">limbs are R-L-C chains</text>

  <rect class="box fontan" x="760" y="520" width="260" height="120"/>
  <text class="txt" x="890" y="570">SVC chain</text>
  <text class="sub" x="890" y="600">3 cells, full 0-D R prior</text>

  <rect class="box fontan" x="760" y="710" width="260" height="120"/>
  <text class="txt" x="890" y="760">IVC chain</text>
  <text class="sub" x="890" y="790">5 cells, full 0-D R prior</text>

  <rect class="box fontan" x="1460" y="520" width="260" height="120"/>
  <text class="txt" x="1590" y="570">RPA chain</text>
  <text class="sub" x="1590" y="600">3 cells, full 0-D R prior</text>

  <rect class="box fontan" x="1460" y="710" width="260" height="120"/>
  <text class="txt" x="1590" y="760">LPA chain</text>
  <text class="sub" x="1590" y="790">4 cells, narrow r=0.003 m</text>

  <rect class="box bed" x="1120" y="850" width="250" height="110"/>
  <text class="txt" x="1245" y="898">pulmonary beds</text>
  <text class="sub" x="1245" y="928">0-D RCR compartments</text>

  <path class="edge" d="M330 300 H430"/>
  <path class="edge" d="M670 300 H770"/>
  <path class="edge" d="M1030 255 H1120"/>
  <path class="thin" d="M1030 235 C1210 130 1370 125 1460 205"/>
  <path class="thin" d="M1380 255 C1440 265 1470 315 1575 330"/>
  <path class="edge" d="M1575 440 C1575 500 1340 520 1245 590"/>
  <path class="edge" d="M1575 280 C1510 470 1030 430 890 520"/>
  <path class="edge" d="M1575 440 C1480 650 1050 660 890 710"/>
  <path class="edge" d="M1020 580 H1120"/>
  <path class="edge" d="M1020 770 C1060 725 1100 690 1120 670"/>
  <path class="edge" d="M1370 620 H1460"/>
  <path class="edge" d="M1370 690 C1410 730 1440 750 1460 770"/>
  <path class="edge" d="M1590 640 C1570 870 1380 900 1370 900"/>
  <path class="edge" d="M1590 830 C1530 930 1400 925 1370 910"/>
  <path class="edge" d="M1120 900 C760 1000 240 790 210 360"/>

  <text class="small" x="80" y="1010">Aortic R is geometry-based per target policy; Fontan limb R starts from calibrated full 0-D pathway priors. Schematic shows planned Task 006 topology.</text>
</svg>
