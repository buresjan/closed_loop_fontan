generated_by: scripts/calibration/extract_targets.py
processed_root: data/processed/aramburu_2024
phase_alignment:
  assumption: Each source table is one processed comparison cycle starting at phase
    0.
  cycle_length: sample_count * median_dt; endpoint at phase 1 is not duplicated.
  beat_integrals: periodic trapezoid integration with final-to-first wraparound.
source_files:
- source_id: direct_measurement
  source_type: direct_measurement
  path: comparison/measurements_last_cycle_clinical.csv
  time_column: time_s
  description: Clinical measurement waveforms from Aramburu et al. measurements.mat,
    already sliced to the comparison cycle.
- source_id: paper_model
  source_type: paper_output
  path: paper_results/model.csv
  time_column: t_s
  description: Closed-loop model output exported from the paper results workbook.
- source_id: nektar_closed_loop_1d
  source_type: nektar_comparison_output
  path: comparison/04_aorta_tcpc_closedloop_1d_last_cycle_clinical.csv
  time_column: time_s
  description: Closed-loop aorta/TCPC 1-D comparison output converted from Nektar
    data.
- source_id: direct_measurement_si_validation
  source_type: direct_measurement
  path: measurements.csv
  description: SI-unit measurement table used to validate clinical-unit conversions.
- source_id: direct_measurement_clinical_validation
  source_type: direct_measurement
  path: measurements_clinical.csv
  description: Clinical-unit measurement table checked against the comparison-cycle
    copy.
schemas:
  summary_targets:
  - target_id
  - source_id
  - source_type
  - canonical_name
  - quantity
  - statistic
  - value
  - unit
  - source_file
  - source_columns
  - cycle_length_s
  - notes
  waveform_targets:
  - source_id
  - source_type
  - signal_id
  - canonical_name
  - quantity
  - unit
  - phase
  - time_s
  - value
  waveform_metadata:
  - signal_id
  - source_id
  - source_type
  - canonical_name
  - quantity
  - unit
  - source_file
  - source_column
  - sample_count
  - cycle_length_s
  - normalization_scale
  - normalization_unit
  - phase_alignment
  - notes
